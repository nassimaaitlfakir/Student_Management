<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
    <title>Students Management</title>
</h:head>

<h:body>
    <h1>Students Management</h1>

    <h:form id="addForm">
        <h2>Add Student</h2>

        <h:panelGrid columns="2" cellpadding="5">
            <h:outputLabel for="firstName" value="First Name:" />
            <h:inputText id="firstName" value="#{studentBean.student.firstName}" required="true" />

            <h:outputLabel for="lastName" value="Last Name:" />
            <h:inputText id="lastName" value="#{studentBean.student.lastName}" required="true" />

            <h:outputLabel for="email" value="Email:" />
                <h:inputText id="email" value="#{studentBean.student.email}" required="true" />

            <h:outputLabel for="birthday" value="Birthday:" />
            <h:inputText id="birthday" value="#{studentBean.student.birthday}" required="true">
                <f:convertDateTime type="localDate" pattern="yyyy-MM-dd"  />
                <f:passThroughAttribute name="type" value="date" />
            </h:inputText>
        </h:panelGrid>

        <br />
        <h:messages  infoStyle="color:green;" errorStyle="color:red;" />
        <h:commandButton value="Add Student" action="#{studentBean.addStudent}" />
    </h:form>

    <br/><br/>


    <h:form id="tableForm">
        <h2>Students List</h2>

        <h:dataTable value="#{studentBean.students}" var="student" border="1" cellpadding="5">

            <h:column>
                <f:facet name="header">ID</f:facet>

                <h:outputText value="#{student.id}" />

            </h:column>

            <h:column>
                <f:facet name="header">Last Name</f:facet>

                <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                    <h:outputText value="#{student.lastName}" />
                </h:panelGroup>

                <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                    <h:inputText value="#{student.lastName}" />
                </h:panelGroup>
            </h:column>

            <h:column>
                <f:facet name="header">First Name</f:facet>

                <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                    <h:outputText value="#{student.firstName}" />
                </h:panelGroup>

                <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                    <h:inputText value="#{student.firstName}" />
                </h:panelGroup>
            </h:column>

            <h:column>
                <f:facet name="header">Email</f:facet>

                <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                    <h:outputText value="#{student.email}" />
                </h:panelGroup>

                <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                    <h:inputText value="#{student.email}" />
                </h:panelGroup>
            </h:column>

            <h:column>
                <f:facet name="header">Birthday</f:facet>

                <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                    <h:outputText value="#{student.birthday}">
                        <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />
                    </h:outputText>
                </h:panelGroup>

                <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                    <h:inputText value="#{student.birthday}">
                        <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />
                        <f:passThroughAttribute name="type" value="date" />
                    </h:inputText>
                </h:panelGroup>
            </h:column>

            <h:column>
                <f:facet name="header">Actions</f:facet>

                <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                    <h:commandButton value="Edit"
                                     action="#{studentBean.editStudent(student.id)}"
                                     immediate="true" />
                    <h:commandButton value="Delete"
                                     action="#{studentBean.deleteStudent(student.id)}"
                                     onclick="return confirm('Are you sure you want to delete this student?');"
                                     immediate="true" />
                </h:panelGroup>

                <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                    <h:commandButton value="Save"
                                     action="#{studentBean.saveStudent}">
                        <f:setPropertyActionListener target="#{studentBean.student}" value="#{student}" />
                    </h:commandButton>
                    <h:commandButton value="Cancel"
                                     action="#{studentBean.cancelEdit()}"
                                     immediate="true" />
                </h:panelGroup>
            </h:column>

        </h:dataTable>
    </h:form>

</h:body>
</html>
