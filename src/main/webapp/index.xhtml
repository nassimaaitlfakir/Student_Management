<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:view locale="#{languageBean.locale}">
    <h:head>
        <title>#{msg.title}</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #f4f7fb;
                margin: 30px;
                color: #1f2937;
            }

            .page-container {
                max-width: 1150px;
                margin: 0 auto;
                background: white;
                padding: 25px;
                border-radius: 14px;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
            }

            h1 {
                text-align: center;
                color: #1e3a8a;
                margin-bottom: 10px;
            }

            h2 {
                color: #374151;
                margin-bottom: 15px;
            }

            .language-box {
                text-align: right;
                margin-bottom: 15px;
            }

            .language-box input[type="submit"] {
                background: #e5e7eb;
                color: #111827;
                border: none;
                padding: 8px 14px;
                border-radius: 6px;
                cursor: pointer;
                margin-left: 8px;
                font-weight: bold;
            }

            .messages {
                margin: 15px 0;
                padding: 10px;
                border-radius: 6px;
                background: #fef3c7;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                background: white;
                overflow: hidden;
            }

            th {
                background: #1e3a8a;
                color: white;
                padding: 12px;
                text-align: center;
                font-weight: bold;
            }

            td {
                padding: 10px;
                text-align: center;
                border-bottom: 1px solid #e5e7eb;
            }

            tr:nth-child(even) {
                background: #f9fafb;
            }

            tfoot td {
                background: #e0f2fe;
                font-weight: bold;
            }

            input[type="text"],
            input[type="date"] {
                width: 95%;
                padding: 7px;
                border: 1px solid #cbd5e1;
                border-radius: 6px;
                box-sizing: border-box;
            }

            input[type="text"]:focus,
            input[type="date"]:focus {
                outline: none;
                border-color: #2563eb;
                box-shadow: 0 0 4px rgba(37, 99, 235, 0.25);
            }

            input[type="submit"] {
                padding: 7px 14px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                margin: 2px;
            }

            .btn-edit {
                background: #f59e0b;
                color: white;
            }

            .btn-delete {
                background: #dc2626;
                color: white;
            }

            .btn-save {
                background: #16a34a;
                color: white;
            }

            .btn-cancel {
                background: #6b7280;
                color: white;
            }

            .btn-add {
                background: #2563eb;
                color: white;
            }
        </style>
    </h:head>

    <h:body>
        <div class="page-container">
            <h1>#{msg.title}</h1>


            <h:form styleClass="language-box">
                <h:commandButton value="English" action="#{languageBean.setLanguage('en')}" />
                <h:commandButton value="Français" action="#{languageBean.setLanguage('fr')}" />
            </h:form>

            <h:messages styleClass="messages" infoStyle="color:green;" errorStyle="color:red;" />

            <h:form id="tableForm">
                <h2>#{msg.studentsList}</h2>

                <h:dataTable value="#{studentBean.students}" var="student" border="1" cellpadding="5">


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.id}" />
                        </f:facet>

                        <h:outputText value="#{student.id}" />

                        <f:facet name="footer">
                            <h:outputText value="#{msg.newLabel}" />
                        </f:facet>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.lastName}" />
                        </f:facet>

                        <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                            <h:outputText value="#{student.lastName}" />
                        </h:panelGroup>

                        <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                            <h:inputText value="#{student.lastName}" required="true" />
                        </h:panelGroup>

                        <f:facet name="footer">
                            <h:inputText id="newLastName"
                                         value="#{studentBean.student.lastName}"
                                          />
                        </f:facet>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.firstName}" />
                        </f:facet>

                        <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                            <h:outputText value="#{student.firstName}" />
                        </h:panelGroup>

                        <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                            <h:inputText value="#{student.firstName}" required="true" />
                        </h:panelGroup>

                        <f:facet name="footer">
                            <h:inputText id="newFirstName"
                                         value="#{studentBean.student.firstName}"
                                         />
                        </f:facet>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.email}" />
                        </f:facet>

                        <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                            <h:outputText value="#{student.email}" />
                        </h:panelGroup>

                        <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                            <h:inputText value="#{student.email}" required="true" />
                        </h:panelGroup>

                        <f:facet name="footer">
                            <h:inputText id="newEmail"
                                         value="#{studentBean.student.email}"
                                          />
                        </f:facet>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.birthday}" />
                        </f:facet>

                        <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                            <h:outputText value="#{student.birthday}">
                                <f:convertDateTime type="localDate" pattern="#{languageBean.datePattern}" />
                            </h:outputText>
                        </h:panelGroup>

                        <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                            <h:inputText value="#{student.birthday}" required="true">
                                <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />
                                <f:passThroughAttribute name="type" value="date" />
                            </h:inputText>
                        </h:panelGroup>

                        <f:facet name="footer">
                            <h:inputText id="newBirthday"
                                         value="#{studentBean.student.birthday}"
                                         >
                                <f:convertDateTime type="localDate" pattern="yyyy-MM-dd" />
                                <f:passThroughAttribute name="type" value="date" />
                            </h:inputText>
                        </f:facet>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{msg.actions}" />
                        </f:facet>

                        <h:panelGroup rendered="#{studentBean.editingId != student.id}">
                            <h:commandButton value="#{msg.edit}"
                                             styleClass="btn-edit"
                                             action="#{studentBean.editStudent(student.id)}"
                                             immediate="true" />
                            <h:commandButton value="#{msg.delete}"
                                             styleClass="btn-delete"
                                             action="#{studentBean.deleteStudent(student.id)}"
                                             onclick="return confirm('#{msg.confirmDelete}');"
                                             immediate="true" />
                        </h:panelGroup>

                        <h:panelGroup rendered="#{studentBean.editingId == student.id}">
                            <h:commandButton value="#{msg.save}"
                                             styleClass="btn-save"
                                             action="#{studentBean.saveStudent}">
                                <f:setPropertyActionListener target="#{studentBean.student}" value="#{student}" />
                            </h:commandButton>
                            <h:commandButton value="#{msg.cancel}"
                                             styleClass="btn-cancel"
                                             action="#{studentBean.cancelEdit()}"
                                             immediate="true" />
                        </h:panelGroup>

                        <f:facet name="footer">
                            <h:commandButton value="#{msg.addStudent}"
                                             styleClass="btn-add"
                                             action="#{studentBean.addStudent}" />
                        </f:facet>
                    </h:column>

                </h:dataTable>
            </h:form>
        </div>
    </h:body>
</f:view>
</html>
